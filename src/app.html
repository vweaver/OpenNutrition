<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
		<meta name="theme-color" content="#16a34a" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#15803d" media="(prefers-color-scheme: dark)" />
		<meta name="description" content="Open-source nutrition tracker with LLM-powered label scanning" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/icon-192.png" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-100">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
